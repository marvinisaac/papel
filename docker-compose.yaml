networks:
    default:
        external:
            name: dev

services:
    frontend:
        image: node:22-alpine
        container_name: papel-frontend
        environment:
            - VIRTUAL_HOST=papel.home
            - VIRTUAL_PORT=5173
        command: "npm run dev"
        volumes:
            - ./frontend:/home/node/app
        working_dir: /home/node/app
    backend:
        build: ./backend
        container_name: papel-backend
        environment:
            - API_TOKEN=changeme
            - PAPEL_DATA_DIR=/data
            - PAPEL_GIT_REMOTE=https://github.com/marvinisaac/papel-data-phase3.git
            - PAPEL_GIT_AUTO_PUSH=true
            - PAPEL_GIT_PAT=${PAPEL_GIT_PAT}
            - VIRTUAL_HOST=papel-api.home
            - VIRTUAL_PORT=3000
        command: "node server.mjs"
        volumes:
            - ./backend:/home/node/app
            - ./data:/data
        working_dir: /home/node/app